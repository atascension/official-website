<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Architech Ascension</title>
    <script>
      // GitHub Pages SPA fallback
      // Encodes the current path into ?p= and redirects to root so the SPA can handle it
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?p=' + encodeURIComponent(l.pathname + l.search) + l.hash
      );
    </script>
  </head>
  <body></body>
</html>
